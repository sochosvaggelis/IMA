name: Layout checks

# Geometry-based layout invariants (tests/layout.spec.ts) across all five
# test viewports. The pixel-comparison suite (tests/visual.spec.ts) does NOT
# run here: its baselines are rendered on Windows, and the same page
# rasterises differently on this runner's software GL — it is run locally
# instead, before pushing.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test tests/layout.spec.ts
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
