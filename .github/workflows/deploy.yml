name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-run a deploy from the Actions tab without pushing.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; the newer push wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # tsc runs as part of this, so a type error fails the deploy rather
      # than shipping a broken site.
      - run: npm run build

      # GitHub Pages has no rewrite rules, so a deep link such as
      # /IMA/services would 404 on refresh. Serving the app shell as the 404
      # page lets it boot anyway and hand the URL to React Router.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
